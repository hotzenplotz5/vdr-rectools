# ==============================================================================
# 🎬 VDR-RECTOOLS - HAUPTKONFIGURATION
# ==============================================================================
# Diese Datei steuert das Verhalten des gesamten vdr-rectools Skripts.
# Nach einer Änderung ist KEIN Neustart nötig, das Skript liest diese
# Datei bei jedem Lauf (Import/Cleanup/Repair) automatisch neu ein.
# ==============================================================================

# ------------------------------------------------------------------------------
# ⚙️ GLOBALE SYSTEM-EINSTELLUNGEN
# ------------------------------------------------------------------------------

# Maximale Anzahl an Dateien (MKV, MP4, etc.), die pro Automatik-Durchlauf 
# verarbeitet werden. Schützt davor, dass der VDR stundenlang mit Importieren blockiert.
MAX_FILES=10

# Absolutes Sicherheitsnetz! Der Import oder Shrink-Vorgang bricht ab, wenn 
# weniger als dieser Wert (in Gigabyte) auf der Video-Partition frei ist.
# Verhindert, dass das Skript deine Festplatte zu 100% vollschreibt.
MIN_FREE_GB=20

# Automatisches Aufräumen: Wenn 1, durchsucht das Skript das Video-Verzeichnis
# nach komplett leeren Aufnahme-Ordnern und löscht diese. 0 schaltet das ab.
AUTO_CLEAN=1

# Das Quell-Verzeichnis für den Import. In diesen Ordner schiebst du deine
# Filme, Serien (MKV, MP4, AVI, WebM). Das Skript holt sie sich von hier ab,
# wandelt sie ins VDR .ts-Format um und schiebt sie nach /srv/vdr/video/.
IMPORT_DIR="/srv/video/Filme"

# Atempause für die CPU: Zeit in Sekunden, die das Skript nach einem schweren
# Arbeitsschritt (wie einem Import oder Re-Encode) wartet. 
PAUSE_WORK=30

# Kurze Pause in Sekunden zwischen reinen Datei-Checks (wie Größenprüfung).
PAUSE_CHECK=2

# Zeitstempel im Video (Format HH:MM:SS), an dem ein Vorschaubild (poster.jpg
# und fanart.jpg) generiert wird, falls die MKV kein eigenes Cover eingebettet hat.
SNAPSHOT_TIME="00:05:00"

# ------------------------------------------------------------------------------
# ✉️ BENACHRICHTIGUNGEN & AUTOMATIK (TIMER)
# ------------------------------------------------------------------------------

# E-Mail-Adresse für Status- und Fehlerberichte. Wenn leer (""), wird keine
# E-Mail gesendet. (Voraussetzung: mailx/mailutils muss auf dem System laufen).
MAIL_NOTIFY=""

# Genereller Hauptschalter für Timer/Cronjob-Aktionen. 
# 1 = Automatik aktiv, 0 = Skript kann nur manuell im Terminal gestartet werden.
AUTO_TIMER=0

# Wenn 1, darf der Systemd-Timer nachts (meist wenn der VDR nicht genutzt wird) 
# automatisch den Scan nach neuen Dateien im IMPORT_DIR starten.
AUTO_START_NIGHT=0

# ------------------------------------------------------------------------------
# 📥 SMART-IMPORT & UNTERTITEL
# ------------------------------------------------------------------------------

# 1 = Das Skript sucht über Subliminal/OpenSubtitles automatisch im Internet 
# nach passenden Untertiteln zum Film und legt sie als VDR-kompatible .srt ab.
AUTO_SUB_DOWNLOAD=1

# Gewünschte Sprache für den Untertitel-Download. ("de" = Deutsch, "en" = Englisch)
SUB_LANG="de"

# 1 = Erlaubt FFmpeg, Dateien, die nicht VDR-kompatibel sind (z.B. DivX, VP9) 
# beim Import automatisch in H.264/H.265 umzukodieren (Re-Encode).
# 0 = Skript darf nur verlustfrei kopieren (Remux). Bei inkompatiblen Formaten Abbruch.
AUTO_ENCODE_IMPORT=1

# ------------------------------------------------------------------------------
# 🎬 TVSCRAPER (METADATEN PLUGIN)
# ------------------------------------------------------------------------------

# 1 = Triggert nach einem erfolgreichen VDR-Import automatisch das TVScraper-Plugin 
# über die SVDRP-Schnittstelle, um Metadaten/Poster zum Film runterzuladen.
USE_TVSCRAPER=0

# Wie soll der TVScraper getriggert werden?
# "immediate" = Plugin soll sofort diesen einen Film scrapen.
# "batch"     = Nichts weiter tun. TVScraper holt sich die Daten beim nächsten Nachtlauf.
TVSCRAPER_MODE="immediate"

# ------------------------------------------------------------------------------
# 🗜️ ENCODING-PARAMETER (FFMPEG QUALITÄT & SPEED)
# ------------------------------------------------------------------------------

# Qualität (CRF) für H.264. Niedriger = Bessere Qualität, aber größere Datei.
# 23 ist ein hervorragender Standard für transparente Qualität.
CRF_H264_DEFAULT=23
# FFmpeg Encoding-Geschwindigkeit. "medium" ist der beste Kompromiss aus Zeit/Qualität.
PRESET_H264_DEFAULT="medium"

# Qualität (CRF) für H.265 (HEVC), wird z.B. vom "Shrink"-Modus genutzt.
CRF_H265_DEFAULT=23
PRESET_H265_DEFAULT="medium"

# Smart Downscaling: Maximale vertikale Auflösung beim "Shrinken" (H.265 Kompression).
# 1080 = Skaliert z.B. 4K Filme beim Shrinken auf Full-HD herunter, um massiv Platz zu sparen.
# 0 = Deaktiviert. Die originale Auflösung der Quelle bleibt immer erhalten!
SHRINK_MAX_RES=0

# Fallback-Werte: Werden genutzt, wenn bei kaputten Dateien die "Deep-Repair" 
# (die nukleare Option) greift und das Video zwingend neu encodiert werden muss.
CRF_H264_FALLBACK=23
PRESET_H264_FALLBACK="fast"

# Hardwarebeschleunigung für FFmpeg (Entlastet die CPU extrem, vor allem beim Shrinken!)
# Unterstützt: "none" (reine CPU), "nvenc" (Nvidia GPU), "vaapi" (Intel/AMD), "qsv" (Intel QuickSync)
HW_ACCEL="none"